name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    env:
      PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-key-for-ci

    steps:
      - name: Debug
        run: |
          echo "=== DEBUG INFO ==="
          echo "Runner OS: ${{ runner.os }}"
          echo "GitHub Event: ${{ github.event_name }}"
          echo "GitHub Ref: ${{ github.ref }}"
          echo "===================="

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Show commit
        run: |
          echo "=== COMMIT INFO ==="
          echo "Current commit: $(git rev-parse HEAD)"
          echo "Current branch: $(git branch --show-current)"
          echo "Origin main: $(git rev-parse origin/main)"
          echo "Last 3 commits:"
          git log --oneline -3
          echo "===================="

      - name: Force fetch
        run: |
          git fetch --all --force
          git checkout -B main origin/main || true

      - name: Verify final state
        run: |
          echo "=== AFTER FETCH ==="
          echo "Current commit: $(git rev-parse HEAD)"
          echo "Last 3 commits:"
          git log --oneline -3
          echo "===================="

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate

      - name: Verify pnpm
        run: pnpm --version

      - name: Clear cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: none
          restore-keys: none

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run check

      - name: Lint format
        run: pnpm run lint:format

      - name: Lint code
        run: pnpm run lint:code

      - name: Run tests
        run: pnpm vitest run
