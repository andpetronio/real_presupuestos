name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    env:
      PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-key-for-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate

      - name: Verify pnpm
        run: pnpm --version

      - name: Cache clean install
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: |
          rm -rf node_modules
          pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run check

      - name: Lint format
        run: pnpm run lint:format

      - name: Lint code
        run: pnpm run lint:code

      - name: Run tests
        run: pnpm vitest run
